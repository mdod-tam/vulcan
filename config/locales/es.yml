      date_label: "Fecha"
      salutation: "Estimado/a %{first_name},"
      closing: "Atentamente,"
      signature:
        organization: "Telecomunicaciones Accesibles de Maryland"
        team: "Equipo de Servicio al Cliente"
      footer:
        address: "Telecomunicaciones Accesibles de Maryland | 123 Main Street, Baltimore, MD 21201"
        contact_line: "Teléfono: 555-123-4567 | Correo electrónico: %{support_email} | Sitio web: mdmat.org"
      page_number: "Página %{page} de %{total}"
      titles:
        application_notifications_account_created: "Su cuenta de Telecomunicaciones Accesibles de Maryland"
        application_notifications_registration_confirmation: "Bienvenido al Programa de Telecomunicaciones Accesibles de Maryland"
