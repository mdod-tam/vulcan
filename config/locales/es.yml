  terms_and_conditions:
    title: "Acuerdo del Programa de Telecomunicaciones Accesibles de Maryland para la Aceptación de Propiedad Estatal para Uso Personal"
    intro: "Entiendo y acepto lo siguiente:"
    item_1_title: "1. Propiedad del Equipo"
    item_1: "El equipo de telecomunicaciones es propiedad del Estado de Maryland. El equipo me es prestado para mi uso personal para acceder al teléfono y puedo usarlo mientras sea residente de este Estado. Las condiciones de mi uso son: (1) No venderé, empeñaré, regalaré, prestaré ni transferiré de ninguna otra manera los derechos que pueda tener sobre este equipo a otras personas y (2) Cumpliré con todos los términos y condiciones de esta declaración que voluntariamente acepto firmar."
    item_2_title: "2. Protección del Equipo"
    item_2: "Protegeré el equipo de daños causados por líquidos, temperaturas extremas y mal cuidado. Entiendo que si el equipo se daña, es posible que deba pagar las reparaciones."
    item_3_title: "3. Reparaciones del Equipo"
    item_3: "Si el equipo se daña, NO intentaré reparar ni desmontar el equipo. Devolveré el equipo al proveedor. Entiendo que si intento reparar o desmontar el equipo, esto anulará la garantía del fabricante y se me exigirá pagar las reparaciones del equipo."
    item_4_title: "4. Desgaste Normal"
    item_4: "Cuando sea necesaria la reparación del equipo debido a DESGASTE NORMAL, a discreción de la oficina de MAT, se me proporcionará sin costo. Debo enviar el equipo de vuelta al proveedor para su servicio."
    item_5_title: "5. Equipo Robado"
    item_5: "Si mi equipo es ROBADO, lo reportaré a la policía de inmediato. Enviaré una copia del reporte policial a la oficina de MAT de inmediato. No se me puede emitir un reemplazo hasta que haya hecho esto."
    item_6_title: "6. Equipo Perdido"
    item_6: "Si PIERDO mi equipo telefónico especializado, debo reportar la pérdida a la oficina del Estado de Maryland/MAT. Entiendo que el Estado NO me dará otro equipo si se pierde."
    item_7_title: "7. Responsabilidad del Usuario e Indemnización"
    item_7: "Entiendo que soy solely responsable del uso del equipo y dicho uso es bajo mi propio riesgo y gasto. Soy solely responsable de cualquier información, incluyendo información confidencial e identificable personal, almaceno en el equipo, o proporciono a otros mediante el uso del equipo, incluyendo garantizar la precisión, autenticidad, integridad y cumplimiento con la ley aplicable que rige mi uso del equipo, y por todas las responsabilidades y pasivas relacionadas. Ni yo ni ninguna otra persona tiene derecho a afirmar ninguna reclamación o causa de acción contra el Estado de Maryland como resultado de o en conexión con el uso de, o incapacidad para usar, el equipo. Si el Estado de Maryland incurre en alguna responsabilidad como resultado de mi uso, o incapacidad para usar, el equipo, indemnizaré al Estado de Maryland en su totalidad de dicha responsabilidad."
    item_8_title: "8. Consecuencias Legales e Indemnización"
    item_8: "Entiendo que es contra la ley presentar declaraciones falsas sobre propiedad estatal perdida, dañada o robada. Entiendo que las declaraciones falsas presentadas por mí pueden resultar en mi procesamiento criminal. Entiendo que si VENDO o EMPEÑO el equipo, puedo ser procesado criminalmente. Entiendo y acepto defender, indemnizar y mantener indemne al Estado de Maryland, y sus unidades, agentes, agencias, departamentos, funcionarios, representantes y empleados de cualquier y todas las reclamaciones, daños y gastos de cualquier naturaleza que surjan del uso o mal uso del equipo por mí o cualquier persona del equipo entregado a mí para mi uso personal. Además entiendo y acepto que el Estado de Maryland, y sus unidades, agentes, agencias, departamentos, funcionarios, representantes y empleados no son responsables del equipo proporcionado por el proveedor del equipo, por cualquier acto de omisiones del proveedor o fabricante del equipo. Cualquier reclamación o disputa sobre el equipo puede afirmarse únicamente contra el proveedor o fabricante del equipo. El Estado no se considerará vendedor del equipo y no se considerará de ninguna manera parte de cualquier transacción(es) entre el cliente y el proveedor o fabricante del equipo."
    item_9_title: "9. Consecuencias de No Cumplimiento"
    item_9: "El incumplimiento de estas Condiciones de Aceptación puede resultar en que se me deniegue el privilegio de tener equipo de acceso telefónico especializado proporcionado por el Estado de Maryland."
    item_10_title: "10. Aprobación y Capacitación"
    item_10: "Tras la aprobación de un formulario de solicitud, entiendo que se me notificará por escrito la aceptación. Si es necesario, solicitaré capacitación específica para el dispositivo que recibiré. Si soy menor, un padre/tutor me acompañará a la capacitación requerida para firmar esta declaración. Si estoy físicamente incapacitado para asistir a la capacitación, puedo llamar al 800-552-7724 (Voz/TTY) 443-453-5970 (Teléfono de Video) para organizar capacitación en un sitio alternativo."
    conclusion: "Habiendo leído las condiciones anteriores o habiéndolas leído y explicado, acepto cumplir con todos los términos y condiciones que yo, o el menor por quien firmo, es elegible para recibir el equipo solicitado teniendo (1) la certificación médica requerida de discapacidad; (2) cumplido las directrices de ingresos recibiendo actualmente SSI, SSDI, TDAP o TANF; (3) firmado la declaración de términos y condiciones para la aceptación de propiedad estatal; y (4) no recibiendo equipo similar a través de otras agencias estatales o federales, o departamentos."
    evaluator_mailer_evaluation_submission_confirmation: "Confirmación de envío de evaluación"
