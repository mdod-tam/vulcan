    proof_rejected:
      remaining_attempts_message:
        one: "Tiene %{count} intento restante para presentar la documentación requerida antes del %{reapply_date}."
        other: "Tiene %{count} intentos restantes para presentar la documentación requerida antes del %{reapply_date}."
      resubmission_options:
        paper: |-
          CÓMO VOLVER A ENVIAR SU DOCUMENTACIÓN:
          1. Responda a este correo electrónico: Simplemente responda a este correo y adjunte su documentación actualizada.
          2. Envíela por correo postal: Puede enviar copias de sus documentos a nuestra oficina, y nosotros las escanearemos y subiremos por usted:
             Telecomunicaciones Accesibles de Maryland
             123 Main Street
             Baltimore, MD 21201
        online: |-
          CÓMO VOLVER A ENVIAR SU DOCUMENTACIÓN:
          1. Responda a este correo electrónico: Simplemente responda a este correo y adjunte su documentación actualizada.
          2. Súbala en línea: Inicie sesión en el panel de su cuenta en %{sign_in_url} y suba sus documentos nuevos de forma segura.
          3. Envíela por correo postal: Puede enviar copias de sus documentos a nuestra oficina, y nosotros las escanearemos y subiremos por usted:
             Telecomunicaciones Accesibles de Maryland
             123 Main Street
             Baltimore, MD 21201
      archived_message: "Lamentablemente, ha alcanzado el número máximo de intentos de envío. Su solicitud ha sido archivada. Puede volver a presentar una solicitud después del %{reapply_date}."
  document_signing:
    medical_certification_request:
      submission_name: "Certificacion medica - %{constituent_full_name} (Solicitud %{application_id})"
      subject: "Solicitud de certificacion de discapacidad para %{constituent_full_name}"
      body: |
        Por favor complete la solicitud de certificacion de discapacidad para %{constituent_full_name}.

        Informacion del solicitante:
        - Nombre: %{constituent_full_name}
        - Fecha de nacimiento: %{constituent_dob_formatted}
        - Telefono: %{constituent_phone_formatted}
        - Correo electronico: %{constituent_email}
        - Direccion: %{constituent_address_formatted}
        - ID de solicitud: %{application_id}

        Use el siguiente enlace de firma para revisar, completar y firmar la certificacion:
        {{submitter.link}}

        Si tiene preguntas, comuniquese con %{support_email}.
