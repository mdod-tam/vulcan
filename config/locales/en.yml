  terms_and_conditions:
    title: "Maryland Accessible Telecommunications Program Agreement for Acceptance of State Property for Personal Use"
    intro: "I understand and agree to the following:"
    item_1_title: "1. Equipment Ownership"
    item_1: "The telecommunications equipment is the property of the State of Maryland. The equipment is loaned to me for my personal use to access the telephone and I may use it for as long as I am a resident of this State. The conditions of my use are: (1) I will not sell, pawn, give away, loan it, or otherwise transfer my rights I might have to this equipment to others and (2) I will comply with all of the terms and conditions of this statement which I voluntarily agree to sign."
    item_2_title: "2. Equipment Protection"
    item_2: "I will protect the equipment from damage by liquid, extreme temperatures, and poor care. I understand if the equipment is damaged, I may be required to pay for repairs."
    item_3_title: "3. Equipment Repairs"
    item_3: "If the equipment is damaged, I will NOT try to repair or disassemble equipment. I will return equipment to the vendor. I understand if I try to repair or disassemble equipment, it will void the manufacturer's warranty and I will be required to pay for repairs on equipment."
    item_4_title: "4. Normal Wear and Tear"
    item_4: "When equipment repair is needed due to NORMAL WEAR AND TEAR, at the MAT office's discretion, it will be provided to me at no cost. I must send the equipment back to the vendor for service."
    item_5_title: "5. Stolen Equipment"
    item_5: "If my equipment is STOLEN, I will report it to the police immediately. I will send a copy of the police report to the MAT office immediately. I cannot be issued a replacement until I have done this."
    item_6_title: "6. Lost Equipment"
    item_6: "If I LOSE my specialized telephone equipment, I must report the loss to the State of Maryland/MAT office. I understand that the State will NOT give me another piece of equipment if lost."
    item_7_title: "7. User Responsibility and Indemnification"
    item_7: "I understand that I am solely responsible for use of the equipment and such use is at my sole risk and expense. I am solely responsible for any information, including confidential and personally identifiable information, I store on the equipment, or I provide to others by use of equipment, including ensuring the accuracy, authenticity, completeness and compliance with applicable law governing my use of the equipment, and for all related liabilities and responsibilities. Neither I nor any other person has the right to assert any claim or cause of action against the State of Maryland as a result of or in connection with the use of, or inability to use, the equipment. If the State of Maryland incurs any liability as a result of my use, or inability to use, the equipment, I will indemnify the State of Maryland to the full extent of any such liability."
    item_8_title: "8. Legal Consequences and Indemnification"
    item_8: "I understand that it is against the law to file false statements regarding lost, damaged, or stolen State property. I understand that false statements filed by me can result in my being criminally prosecuted. I understand that if I SELL or PAWN the equipment, I can be criminally prosecuted. I understand and agree to defend, indemnify, and hold harmless the State of Maryland, and its units, agents, agencies, departments, officials, representatives, and employees from any and all claims, damages, and expenses of whatever nature arising out of use or misuse of equipment by me or any person of equipment given to me for my personal use. I further understand and agree that the State of Maryland, and its units, agents, agencies, departments, officials, representatives, and employees are not responsible for equipment furnished by the supplier of the equipment, for any acts of omissions of the supplier or the manufacturer of the equipment. Any claims or disputes over the equipment may be asserted solely against the supplier or the manufacturer of the equipment. The State shall not be considered a seller of the equipment and shall not be considered in any way a party to any transaction(s) between the customer and the supplier or manufacturer of the equipment."
    item_9_title: "9. Non-Compliance Consequences"
    item_9: "Failure to comply with these Conditions of Acceptance may result in my being denied the privilege of having specialized telephone access equipment provided by the State of Maryland."
    item_10_title: "10. Approval and Training"
    item_10: "Upon approval of an application form, I understand I will be notified of acceptance in writing. If necessary, I will request training specific to the device I will receive. If I am a minor, a parent/guardian will accompany me to the required training to sign this statement. If I am physically unable to attend training, I can call 800-552-7724 (Voice/TTY) 443-453-5970 (Video Phone) to arrange for alternative site training."
    conclusion: "Having read the above conditions or having them read and explained to me, I agree to comply with all of the terms and conditions that I, or the minor for whom I am signing, is eligible to receive the requested equipment having (1) the required medical certification of disability; (2) met the income guidelines by currently receiving SSI, SSDI, TDAP or TANF; (3) signed the statement of terms and conditions for acceptance of State property; and (4) am not receiving similar equipment through other State or Federal agencies, or departments."
    evaluator_mailer_evaluation_submission_confirmation: "Evaluation Submission Confirmation"
